<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador Institucional Serie B</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f1f5f9;
}

.header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.header h1{
margin:0;
font-size:20px;
}

.header p{
margin:5px 0 0 0;
font-size:14px;
opacity:0.9;
}

.container{
padding:25px;
text-align:center;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:14px;
font-size:20px;
text-align:center;
border-radius:10px;
border:1px solid #cbd5e1;
margin-top:15px;
}

button{
margin-top:20px;
background:#1e3a8a;
color:white;
border:none;
padding:14px 30px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

#resultado{
margin-top:25px;
padding:20px;
border-radius:12px;
font-weight:bold;
font-size:20px;
}

.no{
background:#fee2e2;
color:#b91c1c;
border:1px solid #fecaca;
}

.ok{
background:#dcfce7;
color:#166534;
border:1px solid #bbf7d0;
}

.footer{
margin-top:40px;
text-align:center;
font-size:12px;
color:#64748b;
}

.denominaciones{
margin-top:15px;
font-size:14px;
color:#334155;
}

</style>
</head>

<body>

<div class="header">
<h1>🇧🇴 Verificador de Billetes – Serie B</h1>
<p>Billetes de 10, 20 y 50 Bolivianos – Bolivia 2026</p>
</div>

<div class="container">

<div class="card">

<p><strong>Ingrese número de serie (dígita)</strong></p>

<input type="number" id="numero" placeholder="Ej: 086262639">
<br>
<button onclick="verificar()">VERIFICAR</button>

<div id="resultado"></div>

</div>

<div class="denominaciones">
Denominaciones verificadas: 10 Bs | 20 Bs | 50 Bs
</div>

<div class="footer">
Desarrollado por Brayan L. Quispe
</div>

</div>

<script>

function dentroRango(num, desde, hasta){
return num >= desde && num <= hasta;
}

function verificar(){

let numero = document.getElementById("numero").value;
numero = numero.replace(/\D/g,'');
numero = numero.padStart(9,"0");
let num = parseInt(numero);

let invalido = false;
let tipo = "";

// 10 Bs
if(
dentroRango(num,67250001,67700000) ||
dentroRango(num,69050001,69500000) ||
dentroRango(num,69500001,69950000) ||
dentroRango(num,69950001,70400000) ||
dentroRango(num,70400001,70850000) ||
dentroRango(num,70850001,71300000) ||
dentroRango(num,76310012,85139995) ||
dentroRango(num,86400001,86850000) ||
dentroRango(num,90900001,91350000) ||
dentroRango(num,91800001,92250000)
){
invalido = true;
tipo = "10 Bs";
}

// 20 Bs
if(
dentroRango(num,87280145,91646549) ||
dentroRango(num,96650001,97100000) ||
dentroRango(num,99800001,100250000) ||
dentroRango(num,100250001,100700000) ||
dentroRango(num,109250001,109700000) ||
dentroRango(num,110600001,111050000) ||
dentroRango(num,111050001,111500000) ||
dentroRango(num,111950001,112400000) ||
dentroRango(num,112400001,112850000) ||
dentroRango(num,112850001,113300000) ||
dentroRango(num,114200001,114650000) ||
dentroRango(num,114650001,115100000) ||
dentroRango(num,115100001,115550000) ||
dentroRango(num,118700001,119150000) ||
dentroRango(num,119150001,119600000) ||
dentroRango(num,120500001,120950000)
){
invalido = true;
tipo = "20 Bs";
}

// 50 Bs
if(
dentroRango(num,77100001,77550000) ||
dentroRango(num,78000001,78450000) ||
dentroRango(num,78900001,96350000) ||
dentroRango(num,96350001,96800000) ||
dentroRango(num,96800001,97250000) ||
dentroRango(num,98150001,98600000) ||
dentroRango(num,104900001,105350000) ||
dentroRango(num,105350001,105800000) ||
dentroRango(num,106700001,107150000) ||
dentroRango(num,107600001,108050000) ||
dentroRango(num,108050001,108500000) ||
dentroRango(num,109400001,109850000)
){
invalido = true;
tipo = "50 Bs";
}

if(invalido){
document.getElementById("resultado").className="no";
document.getElementById("resultado").innerHTML=
"NO RECIBIR<br><br>Razón: Número sin valor legal – "+tipo+"<br><br>"+numero+" - B";
}else{
document.getElementById("resultado").className="ok";
document.getElementById("resultado").innerHTML=
"RECIBIR<br><br>"+numero+" - B";
}

}

</script>

</body>
</html>
