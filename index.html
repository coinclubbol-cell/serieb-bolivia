<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serie B Bolivia</title>

<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}
video{
width:90%;
margin-top:20px;
border-radius:10px;
}
button{
margin-top:15px;
padding:10px 20px;
font-size:18px;
background:#c40000;
color:white;
border:none;
border-radius:8px;
}
#resultado{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
.no{color:red;}
.ok{color:lime;}
</style>
</head>

<body>

<h2>Serie B Bolivia</h2>
<p>Apunte al número y presione ESCANEAR</p>

<video id="video" autoplay></video>
<br>
<button onclick="capturar()">ESCANEAR</button>

<div id="resultado"></div>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
video.srcObject = stream;
});

function dentroRango(num, desde, hasta){
return num >= desde && num <= hasta;
}

function verificar(numero){

numero = parseInt(numero);

let invalido = false;
let tipo = "";

if(dentroRango(numero,67250001,67700000)){
invalido=true; tipo="10 Bs";
}

if(dentroRango(numero,87280145,91646549)){
invalido=true; tipo="20 Bs";
}

if(dentroRango(numero,77100001,77550000)){
invalido=true; tipo="50 Bs";
}

if(invalido){
document.getElementById("resultado").innerHTML =
"<div class='no'>NO RECIBIR<br>Sin valor legal – "+tipo+"</div>";
}else{
document.getElementById("resultado").innerHTML =
"<div class='ok'>RECIBIR</div>";
}
}

async function capturar(){

document.getElementById("resultado").innerHTML="Analizando...";

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);

const result = await Tesseract.recognize(
canvas,
'eng',
{ tessedit_char_whitelist: '0123456789' }
);

let texto = result.data.text;
let match = texto.match(/\d{8,9}/);

if(match){
verificar(match[0]);
}else{
document.getElementById("resultado").innerHTML =
"<div class='no'>No se detectó número</div>";
}

}
</script>

</body>
</html>
